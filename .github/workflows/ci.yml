name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pyflakes
          # Install MCP without heavy system deps for CI
          pip install mcp

      - name: Ruff lint
        run: ruff check . --select E,F,W,I --ignore E501

      - name: Check imports resolve
        run: |
          python -c "import tools.utils"
          python -c "import tools.reversing"
          python -c "import tools.crypto"
          python -c "import tools.web"
          python -c "import tools.forensics"
          echo "All imports OK"

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t kademcp:ci .
